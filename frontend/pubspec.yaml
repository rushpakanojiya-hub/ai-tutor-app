name: ai_tutor_app
description: AI Tutor Mobile Application MVP - Day 1 (Auth + Dashboard shell)
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # Networking
  dio: ^5.4.3+1

  # Local storage (JWT token, user info)
  shared_preferences: ^2.2.3

  # Navigation
  go_router: ^14.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true