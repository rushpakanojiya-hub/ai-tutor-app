# Brings up PostgreSQL and the Go backend together for local development.
# Usage: docker compose up --build
#
# The Flutter app still talks to the backend the same way as before —
# only the *host* changes (localhost:8080 either way; see README for the
# Android emulator / physical device notes).
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-tutor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
      POSTGRES_DB: ${DB_NAME:-ai_tutor_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-tutor-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      GIN_MODE: release
      APP_ENV: docker
      DATABASE_URL: "postgresql://postgres:CONFIRM1_PASSWORD@ai-tutor-db.c12wueweo2b2.ap-south-1.rds.amazonaws.com:5432/ai_tutor_db?sslmode=require"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      JWT_SECRET: ${JWT_SECRET:-insecure_dev_secret_change_me}
      JWT_ACCESS_EXPIRY_MINUTES: "43200"
      JWT_REFRESH_EXPIRY_DAYS: ${JWT_REFRESH_EXPIRY_DAYS:-7}
      GROQ_API_KEY: "${GROQ_API_KEY}"
      YOUTUBE_API_KEY: "${YOUTUBE_API_KEY}"
      YOUTUBE_MAX_RESULTS: "5"
      LIVEKIT_URL: "wss://ai-tutor-app-uh2ki4to.livekit.cloud"
      LIVEKIT_API_KEY: "APIpf6jFai4nYrb"
      LIVEKIT_API_SECRET: "Xxu1CHZI2t2NU7mTfUYqyk1ylaT6yWKIkZAk0BrnOxT"
      CLOUDINARY_CLOUD_NAME: "dkunif6kd"
      CLOUDINARY_API_KEY: "388133647461626"
      CLOUDINARY_API_SECRET: "3pmCNYrWv-wbNKTfe1EAvZJNZ1M"
    ports:
      - "80:8080"
    networks:
      - backend-network

  # Optional helper: run migrations against the Dockerized Postgres without
  # installing golang-migrate locally. Doesn't start automatically —
  # only runs when explicitly invoked (see README / Makefile "make migrate").
  migrate:
    image: migrate/migrate:v4.17.1
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    networks:
      - backend-network
    entrypoint:
      - migrate
      - -path=/migrations
      - -database=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-root}@postgres:5432/${DB_NAME:-ai_tutor_db}?sslmode=disable
      - up

volumes:
  postgres-data:

networks:
  backend-network:
    driver: bridge
